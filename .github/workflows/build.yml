name: Build and Publish Svarog CommandCenter

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Build and Publish App
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # 👈 ТЕПЕР WINDOWS НЕ СКАСУЄТЬСЯ, ЯКЩО MAC ВПАДЕ!
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      - name: Compile and Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win -p always
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac -p always
          fi
        shell: bash